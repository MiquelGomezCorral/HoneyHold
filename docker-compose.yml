name: HoneyHold

services:
  # ── MySQL ──────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HoneyHold-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-finance}
      MYSQL_USER: ${MYSQL_USER:-finance}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-finance-pw}
    volumes:
      - db_data:/var/lib/mysql
      # Schema + seeds run automatically on the FIRST boot of an empty volume.
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./backend/src/config/protected-tags.conf:/opt/honeyhold/protected-tags.conf:ro
    ports:
      - "127.0.0.1:3306:3306" # local inspection only; remove if not needed
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Node.js API ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-finance}
      DB_USER: ${MYSQL_USER:-finance}
      DB_PASSWORD: ${MYSQL_PASSWORD:-finance-pw}
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  # ── React (Vite dev server) ────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_PROXY: http://backend:4000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # ── Automated backups (cron + mysqldump) ───────────────────────────────
  db-backup:
    build: ./db/backup
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-finance}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HoneyHold-root}
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
