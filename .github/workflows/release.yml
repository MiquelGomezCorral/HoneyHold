name: Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least privilege by default; the release job widens this below.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (typecheck & build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — install, typecheck, build
        working-directory: backend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Frontend — install, typecheck, build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

  release:
    name: Release
    needs: verify
    # Only release from pushes to master — never on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the release commit + tag
      issues: write         # comment on released issues
      pull-requests: write  # comment on released PRs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # semantic-release needs full history + tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install release tooling
        run: npm install --no-audit --no-fund

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
