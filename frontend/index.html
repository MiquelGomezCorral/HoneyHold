<!doctype html>
<html lang="en" data-theme-storage-key="HoneyHold.theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (() => {
        const root = document.documentElement;
        const storageKey = root.dataset.themeStorageKey;
        let theme = null;
        try {
          theme = storageKey ? localStorage.getItem(storageKey) : null;
        } catch {}
        const dark = theme === 'dark' || (theme !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        root.classList.toggle('dark', dark);
        root.classList.toggle('light', theme === 'light');
        document.querySelector('meta[name="color-scheme"]').content = dark ? 'dark' : 'light';
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>HoneyHold · home ledger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
